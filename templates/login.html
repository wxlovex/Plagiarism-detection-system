<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>登录</title>
    <link href="{{ url_for('static', filename='bootstrap/css/bootstrap.min.css') }}" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-container {
            background-color: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            color: #2d3436;
            margin-bottom: 1.5rem;
            text-align: center;
            font-weight: 600;
        }
        .form-control {
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 0.75rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #4dabf7;
            box-shadow: 0 0 0 3px rgba(77, 171, 247, 0.25);
            outline: none;
        }
        .btn-primary {
            background-color: #1971c2;
            border-color: #1971c2;
            border-radius: 8px;
            padding: 0.75rem;
            font-weight: 500;
            transition: all 0.3s ease;
            width: 100%;
        }
        .btn-primary:hover {
            background-color: #1660b0;
            border-color: #1660b0;
            transform: translateY(-2px);
        }
        .alert {
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }
        .link-text {
            text-align: center;
            margin-top: 1.5rem;
            color: #6c757d;
        }
        .link-text a {
            color: #4dabf7;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        .link-text a:hover {
            color: #1971c2;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2>用户登录</h2>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert alert-info">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}
        <form method="POST">

            <!-- 新增：角色选择 -->
            <div class="mb-4" >
                <label class="form-label fw-bold">请选择登录身份：</label>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="login_role" id="role_student" value="student" checked>
                    <label class="form-check-label" for="role_student">普通用户登录</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="login_role" id="role_admin" value="admin">
                    <label class="form-check-label" for="role_admin">管理员登录</label>
                </div>
            </div>

            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label">用户名</label>
                <input type="text" class="form-control" name="username" required>
            </div>
            <div class="mb-4">
                <label class="form-label">密码</label>
                <input type="password" class="form-control" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary">登录</button>
        </form>
        <p class="link-text"><a href="{{ url_for('register') }}">注册新用户</a></p>
    </div>
</body>
</html>
