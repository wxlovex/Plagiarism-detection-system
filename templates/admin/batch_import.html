<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>批量导入模板</title>
    <link href="{{ url_for('static', filename='bootstrap/css/bootstrap.min.css') }}" rel="stylesheet">
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">🚀 批量导入 TXT 模板</h4>
                </div>
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        {{ form.hidden_tag() }}   <!-- 关键：必须有这一行！ -->

                        <div class="mb-3">
                            <label class="form-label">选择多个 TXT 文件</label>
                            <input type="file" name="files" class="form-control" multiple accept=".txt" required>
                            <small class="text-muted">可一次选择多个 .txt 文件，每个文件会自动以文件名作为标题</small>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">分类</label>
                                <select name="category" class="form-select">
                                    <option value="general">通用致谢</option>
                                    <option value="computer">计算机专业</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">学校/专业标签</label>
                                <input type="text" name="school" class="form-control" value="通用">
                            </div>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-success btn-lg">开始批量导入</button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center">
                    <a href="{{ url_for('admin.templates_list') }}" class="btn btn-link">← 返回模板列表</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
